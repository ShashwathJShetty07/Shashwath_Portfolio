<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>my-project</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
      :root{--bg1:#ff9a9e;--bg2:#fad0c4;--accent:#ffffff}
      html,body{height:100%;margin:0;font-family:Inter,system-ui,-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial,Helvetica,sans-serif}
      body{background:linear-gradient(135deg,var(--bg1),var(--bg2));display:flex;align-items:center;justify-content:center;color:var(--accent);-webkit-font-smoothing:antialiased}
      .hero{max-width:900px;padding:48px;border-radius:20px;text-align:center;backdrop-filter:blur(6px);box-shadow:0 10px 30px rgba(0,0,0,0.12);background:linear-gradient(180deg,rgba(255,255,255,0.06),rgba(255,255,255,0.02));}
      .hero h1{font-size: clamp(28px,6vw,72px);margin:0 0 12px;font-weight:800;letter-spacing:-0.02em}
      .hero p{margin:0;font-size:16px;opacity:0.92}
      @media (max-width:520px){.hero{padding:28px;border-radius:16px}}
    </style>
  </head>
  <body>
    <main class="hero" role="main" aria-labelledby="welcome-heading">
      <h1 id="welcome-heading">Welcome to my site cutie</h1>
      <p>Glad you're here — explore and enjoy.</p>
    </main>
    <div id="root" style="display:none"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
