<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>my-project</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
      :root{--bg1:#ff9a9e;--bg2:#fad0c4;--accent:#ffffff}
      html,body{height:100%;margin:0;font-family:Inter,system-ui,-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial,Helvetica,sans-serif}
      body{background:linear-gradient(135deg,var(--bg1),var(--bg2));display:flex;align-items:center;justify-content:center;color:var(--accent);-webkit-font-smoothing:antialiased}

      /* Entry overlay */
      .entry-overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,rgba(0,0,0,0.28),rgba(0,0,0,0.36));backdrop-filter:blur(6px);z-index:60;transition:opacity .6s ease,transform .6s ease}
      .entry-overlay.hide{opacity:0;transform:scale(.98);pointer-events:none}

      .enter-btn{background:linear-gradient(180deg,rgba(255,255,255,0.12),rgba(255,255,255,0.06));border:1px solid rgba(255,255,255,0.18);color:var(--accent);padding:14px 26px;border-radius:12px;font-weight:700;font-size:18px;cursor:pointer;box-shadow:0 8px 28px rgba(0,0,0,0.25);transition:transform .22s cubic-bezier(.2,.9,.2,1),box-shadow .15s ease}
      .enter-btn:hover{transform:translateY(-4px) scale(1.02);box-shadow:0 12px 36px rgba(0,0,0,0.28)}
      .enter-btn:active{transform:translateY(-2px) scale(.995)}

      /* Hero with reveal animation */
      .hero{max-width:900px;padding:48px;border-radius:20px;text-align:center;backdrop-filter:blur(6px);box-shadow:0 10px 30px rgba(0,0,0,0.12);background:linear-gradient(180deg,rgba(255,255,255,0.06),rgba(255,255,255,0.02));transform:scale(.98);opacity:0;transition:opacity .72s cubic-bezier(.2,.9,.2,1),transform .72s cubic-bezier(.2,.9,.2,1)}
      .hero.revealed{transform:scale(1);opacity:1}
      .hero h1{font-size: clamp(28px,6vw,72px);margin:0 0 12px;font-weight:800;letter-spacing:-0.02em}
      .hero p{margin:0;font-size:16px;opacity:0.92}
      @media (max-width:520px){.hero{padding:28px;border-radius:16px}}
    </style>
  </head>
  <body>
    <div class="entry-overlay" id="entryOverlay" aria-hidden="false">
      <button id="enterBtn" class="enter-btn" aria-label="Enter site">Click here</button>
    </div>

    <main class="hero" role="main" aria-labelledby="welcome-heading" aria-hidden="true">
      <h1 id="welcome-heading">Welcome to my site cutie</h1>
      <p>Glad you're here — explore and enjoy.</p>
    </main>

    <div id="root" style="display:none"></div>
    <script>
      (function(){
        const overlay = document.getElementById('entryOverlay');
        const btn = document.getElementById('enterBtn');
        const hero = document.querySelector('.hero');
        function reveal(){
          overlay.classList.add('hide');
          overlay.setAttribute('aria-hidden','true');
          hero.setAttribute('aria-hidden','false');
          hero.classList.add('revealed');
          setTimeout(()=>overlay.style.display='none',600);
        }
        btn.addEventListener('click', reveal);
        // allow Enter/Space activation
        btn.addEventListener('keydown', (e)=>{ if(e.key==='Enter' || e.key===' ') reveal(); });
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
